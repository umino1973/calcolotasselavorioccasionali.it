<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TaxCopilot Wizard</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #0f172a;
    color: #e2e8f0;
}

.container {
    max-width: 700px;
    margin: auto;
    padding: 40px 20px;
}

h1 {
    text-align: center;
    margin-bottom: 20px;
}

.card {
    background: #1e293b;
    padding: 25px;
    border-radius: 12px;
}

button {
    padding: 10px 15px;
    margin: 10px 5px 0 0;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    background: #38bdf8;
    color: black;
    font-weight: bold;
}

button.secondary {
    background: #334155;
    color: white;
}

input, select {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border-radius: 8px;
    border: none;
}

.step {
    display: none;
}

.step.active {
    display: block;
}

.result {
    white-space: pre-wrap;
    background: #0b1220;
    padding: 15px;
    border-radius: 10px;
    margin-top: 20px;
}
</style>
</head>

<body>

<div class="container">
    <h1>TaxCopilot Wizard</h1>

    <div class="card">

        <!-- STEP 1 -->
        <div class="step active" id="step1">
            <h2>Che tipo di attività fai?</h2>
            <select id="activity">
                <option value="dogsitter">Dogsitter / pet care</option>
                <option value="freelance">Freelance digitale</option>
                <option value="occasionali">Lavori occasionali</option>
                <option value="altro">Altro</option>
            </select>
            <button onclick="nextStep()">Avanti</button>
        </div>

        <!-- STEP 2 -->
        <div class="step" id="step2">
            <h2>Guadagno annuo stimato (€)</h2>
            <input type="number" id="income" placeholder="es. 12000"/>
            <button onclick="prevStep()" class="secondary">Indietro</button>
            <button onclick="nextStep()">Avanti</button>
        </div>

        <!-- STEP 3 -->
        <div class="step" id="step3">
            <h2>Quanto è stabile il lavoro?</h2>
            <select id="continuity">
                <option value="occasionale">Occasionale</option>
                <option value="semi">Semi-regolare</option>
                <option value="regolare">Regolare</option>
                <option value="full">Full-time</option>
            </select>
            <button onclick="prevStep()" class="secondary">Indietro</button>
            <button onclick="nextStep()">Avanti</button>
        </div>

        <!-- STEP 4 -->
        <div class="step" id="step4">
            <h2>Hai costi?</h2>
            <select id="costs">
                <option value="none">Nessuno</option>
                <option value="low">Bassi</option>
                <option value="medium">Medi</option>
                <option value="high">Alti</option>
            </select>
            <button onclick="prevStep()" class="secondary">Indietro</button>
            <button onclick="nextStep()">Avanti</button>
        </div>

        <!-- STEP 5 -->
        <div class="step" id="step5">
            <h2>Obiettivo</h2>
            <select id="goal">
                <option value="extra">Guadagno extra</option>
                <option value="stable">Reddito stabile</option>
                <option value="main">Lavoro principale</option>
                <option value="scale">Crescita/impresa</option>
            </select>

            <button onclick="prevStep()" class="secondary">Indietro</button>
            <button onclick="calculate()">Analizza</button>
        </div>

        <!-- RESULT -->
        <div class="step" id="resultStep">
            <h2>Risultato</h2>
            <div class="result" id="result"></div>
            <button onclick="restart()">Ricomincia</button>
        </div>

    </div>
</div>

<script>
let currentStep = 1;

function showStep(step) {
    document.querySelectorAll(".step").forEach(s => s.classList.remove("active"));
    document.getElementById("step" + step)?.classList.add("active");
    if (step === "result") {
        document.getElementById("resultStep").classList.add("active");
    }
    currentStep = step;
}

function nextStep() {
    showStep(currentStep + 1);
}

function prevStep() {
    showStep(currentStep - 1);
}

function calculate() {

    const income = parseFloat(document.getElementById("income").value || 0);
    const continuity = document.getElementById("continuity").value;
    const costs = document.getElementById("costs").value;
    const goal = document.getElementById("goal").value;
    const activity = document.getElementById("activity").value;

    // --- SIMULAZIONE BASE ---

    let occasionalNet = income * 0.78;
    let flatTaxNet = income * 0.75;
    let ordinaryNet = income * 0.60;

    let recommendation = "";

    // logica semplice ma efficace
    if (income < 5000 && continuity === "occasionale") {
        recommendation = "Prestazione occasionale può andare bene";
    } else if (income < 30000) {
        recommendation = "Partita IVA regime forfettario è la scelta migliore";
    } else {
        recommendation = "Valuta regime ordinario o struttura avanzata";
    }

    let resultText = `
📊 ANALISI TAXCOPILOT

Attività: ${activity}
Reddito: €${income}
Continuità: ${continuity}
Costi: ${costs}
Obiettivo: ${goal}

---

🥇 PRESTAZIONE OCCASIONALE
Netto stimato: €${occasionalNet.toFixed(0)}

🥈 REGIME FORFETTARIO
Netto stimato: €${flatTaxNet.toFixed(0)}

🥉 REGIME ORDINARIO
Netto stimato: €${ordinaryNet.toFixed(0)}

---

🧠 RACCOMANDAZIONE:
${recommendation}

⚠️ Simulazione indicativa basata su modello semplificato fiscale italiano.
    `;

    document.getElementById("result").innerText = resultText;
    showStep("result");
}

function restart() {
    location.reload();
}
</script>

</body>
</html>
