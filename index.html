<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaxCopilot Money Finder v3 FIX</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #070b16;
  color: white;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 40px;
}

h1 { font-size: 28px; }

.subtitle { color: #94a3b8; margin-bottom: 20px; }

textarea {
  width: 100%;
  min-height: 120px;
  padding: 12px;
  border-radius: 10px;
  border: none;
  margin-top: 10px;
}

button {
  margin-top: 15px;
  padding: 12px 18px;
  background: #22c55e;
  border: none;
  color: white;
  font-weight: bold;
  border-radius: 10px;
  cursor: pointer;
}

.card {
  margin-top: 20px;
  padding: 20px;
  background: #111a2e;
  border-radius: 12px;
  white-space: pre-wrap;
  border: 1px solid #1f2a44;
}

.error {
  color: #ff6b6b;
}
</style>
</head>

<body>

<div class="container">
  <h1>TaxCopilot 💰 v3 FIX</h1>
  <div class="subtitle">Analisi incentivi e strategie fiscali</div>

  <textarea id="idea" placeholder="Scrivi la tua idea..."></textarea>

  <button onclick="runAI()">Analizza</button>

  <div class="card" id="output">Pronto...</div>
</div>

<script>

async function runAI() {
  const idea = document.getElementById("idea").value;
  const output = document.getElementById("output");

  output.innerText = "Analisi in corso...";

  const API_KEY = "sk-xxxxx";
  // 🔴 IMPORTANTE: sostituisci questa stringa

  const controller = new AbortController();
  const timeout = setTimeout(() => controller.abort(), 30000);

  try {
    const response = await fetch("https://api.openai.com/v1/chat/completions", {
      method: "POST",
      signal: controller.signal,
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + API_KEY
      },
      body: JSON.stringify({
        model: "gpt-4o-mini",
        messages: [
          {
            role: "system",
            content: `
Sei TaxCopilot MONEY FINDER v3.

Trova opportunità economiche reali in Italia.

REGOLE:
- dividi incentivi in facili / medi / difficili
- assegna probabilità 0–100
- proponi strategia concreta
- massimizza opportunità legali

OUTPUT JSON.
            `
          },
          {
            role: "user",
            content: idea
          }
        ]
      })
    });

    clearTimeout(timeout);

    if (!response.ok) {
      throw new Error("Errore API: " + response.status);
    }

    const data = await response.json();

    output.innerText =
      data.choices?.[0]?.message?.content || "Nessun risultato";

  } catch (err) {
    clearTimeout(timeout);

    output.innerHTML =
      "<div class='error'>Errore API o connessione</div>\n\n" +
      "Dettaglio: " + err.message;
  }
}

</script>

</body>
</html>
