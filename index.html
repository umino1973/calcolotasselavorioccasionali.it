<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaxCopilot Money Finder v3</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #070b16;
  color: white;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 40px;
}

h1 {
  font-size: 30px;
}

.subtitle {
  color: #94a3b8;
  margin-bottom: 20px;
}

textarea {
  width: 100%;
  min-height: 120px;
  padding: 12px;
  border-radius: 10px;
  border: none;
  margin-top: 10px;
}

button {
  margin-top: 15px;
  padding: 12px 18px;
  background: #22c55e;
  border: none;
  color: white;
  font-weight: bold;
  border-radius: 10px;
  cursor: pointer;
}

.card {
  margin-top: 20px;
  padding: 20px;
  background: #111a2e;
  border-radius: 12px;
  white-space: pre-wrap;
  border: 1px solid #1f2a44;
}

.badge {
  display: inline-block;
  padding: 4px 8px;
  background: #1f2937;
  border-radius: 6px;
  font-size: 12px;
  margin-bottom: 10px;
}
</style>
</head>

<body>

<div class="container">
  <h1>TaxCopilot 💰 Money Finder v3</h1>
  <div class="subtitle">Trova incentivi, opportunità e strategie reali di accesso ai fondi</div>

  <textarea id="idea" placeholder="Descrivi la tua idea (es: dogsitter, freelance, microimpresa...)"></textarea>

  <button onclick="runAI()">Analizza opportunità</button>

  <div class="card" id="output">Risultati qui...</div>
</div>

<script>
async function runAI() {
  const idea = document.getElementById("idea").value;

  document.getElementById("output").innerText = "Analisi incentivi in corso...";

  const response = await fetch("https://api.openai.com/v1/chat/completions", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer YOUR_API_KEY"
    },
    body: JSON.stringify({
      model: "gpt-4o-mini",
      messages: [
        {
          role: "system",
          content: `
Sei TaxCopilot MONEY FINDER v3.

OBIETTIVO:
Massimizzare opportunità economiche legali in Italia tramite incentivi, bandi e strategie fiscali.

REGOLE:
- NON elencare incentivi casuali
- Valuta compatibilità reale (0–100)
- Dividi in: FACILI / MEDI / DIFFICILI
- Ogni incentivo deve avere probabilità di accesso
- Proponi SEMPRE strategia per aumentare possibilità
- Se non perfetto → combina opportunità

OUTPUT SOLO JSON:

{
  "profilo": {
    "attivita": "",
    "stadio": "idea | micro | impresa",
    "potenziale": "basso | medio | alto"
  },
  "opportunita": {
    "facili": [
      {
        "nome": "",
        "valore": "",
        "compatibilita": 0,
        "probabilita_accesso": 0,
        "perche": ""
      }
    ],
    "medie": [],
    "difficili": []
  },
  "strategia": {
    "percorso_ottimale": "",
    "step_accesso_fondi": [
      "",
      "",
      ""
    ],
    "ottimizzazione": ""
  },
  "posizionamento": {
    "come_presentarsi": "",
    "errore_da_evitate": ""
  }
}
          `
        },
        {
          role: "user",
          content: idea
        }
      ]
    })
  });

  const data = await response.json();

  document.getElementById("output").innerText =
    data.choices[0].message.content;
}
</script>

</body>
</html>
