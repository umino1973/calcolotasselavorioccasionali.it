<body>

<div class="container">

<h1>💡 AI Funding Advisor V9</h1>

<!-- 🔐 LOGIN -->
<div class="card" id="auth">
  <button onclick="login()">Login</button>
  <button onclick="logout()">Logout</button>
  <div id="userInfo"></div>
</div>

<div class="card">

<input id="idea" placeholder="Idea">
<input id="sector" placeholder="Settore">

<select id="stage">
  <option value="idea">Idea</option>
  <option value="mvp">MVP</option>
  <option value="startup">Startup</option>
</select>

<input id="region" placeholder="Regione">
<input id="capital" placeholder="Capitale">

<button onclick="generateFunding()">Analizza</button>

</div>

<div id="output"></div>

</div>

<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
<script src="app.js"></script>

</body>
